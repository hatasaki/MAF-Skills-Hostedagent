name: maf-skills-orchestrator
description: >
  Microsoft Agent Framework の Agent Skills 機能で
  Microsoft 技術専門家エージェントと Web 検索エージェントを呼び分ける
  オーケストレーションエージェント (Foundry Hosted Agent としてデプロイ)。
metadata:
  tags:
    - Agent Framework
    - Agent Skills
    - Multi-Agent Orchestration
    - Foundry Hosted Agent
    - Responses Protocol
template:
  name: maf-skills-orchestrator
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # Foundry プロジェクト内の LLM モデルデプロイ名
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # 既存の Microsoft 技術専門家 (Microsoft Learn) エージェント
    - name: MS_LEARN_AGENT_NAME
      value: "{{MS_LEARN_AGENT_NAME}}"
    - name: MS_LEARN_AGENT_VERSION
      value: "{{MS_LEARN_AGENT_VERSION}}"
    # 既存の Web 検索エージェント
    - name: WEB_SEARCH_AGENT_NAME
      value: "{{WEB_SEARCH_AGENT_NAME}}"
    - name: WEB_SEARCH_AGENT_VERSION
      value: "{{WEB_SEARCH_AGENT_VERSION}}"
resources:
  - kind: model
    id: gpt-5.2
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
